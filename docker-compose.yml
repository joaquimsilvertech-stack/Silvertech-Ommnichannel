services:
  redis:
    image: redis:alpine
    container_name: silvertech_redis
    ports:
      - "6379:6379"
    restart: always

  evolution-postgres:
    image: postgres:16-alpine
    container_name: silvertech_evolution_postgres
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution_senha_local
      - POSTGRES_DB=evolution
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    restart: always

  evolution:
    image: atendai/evolution-api:latest
    container_name: silvertech_evolution
    ports:
      - "8080:8080"
    environment:
      # Conexão e autenticação da API
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=silvertech_chave_secreta_123

      # Banco de dados (persistência de instâncias/sessões)
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution_senha_local@evolution-postgres:5432/evolution

      # Cache (Redis compartilhado, db index 1 — separado do Celery/Channels que usam db 0)
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1

      # Versão do WhatsApp Web simulada pelo Baileys.
      # IMPORTANTE: expira em 17/08/2026 — atualizar periodicamente em
      # https://wppconnect.io/pt-BR/whatsapp-versions/ ou a conexão volta a falhar.
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1041652166
      - CONFIG_SESSION_PHONE_CLIENT=Chrome
      - CONFIG_SESSION_PHONE_NAME=SilvertechCRM
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      - evolution-postgres
      - redis
    restart: always

volumes:
  evolution_instances:
  evolution_store:
  evolution_postgres_data: