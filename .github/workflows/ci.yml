name: Django CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    # Containers de suporte usados pelo Django durante migrations e testes.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: silvertech_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d silvertech_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      # Configuracoes Django e servicos locais do runner.
      SECRET_KEY: test-key
      DEBUG: "False"
      POSTGRES_DB: silvertech_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_CACHE_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      EVOLUTION_API_URL: http://localhost:8080
      EVOLUTION_API_KEY: test-evolution-key
      EVOLUTION_INSTANCE_NAME: silvertech_whatsapp
      SENTRY_DSN: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Normalize requirements encoding
        # O requirements.txt local pode estar em UTF-16; normalizamos no runner.
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path("requirements.txt")
          raw = source.read_bytes()
          try:
              text = raw.decode("utf-8-sig")
          except UnicodeDecodeError:
              text = raw.decode("utf-16")

          Path("/tmp/requirements-ci.txt").write_text(text, encoding="utf-8")
          PY

      - name: Install dependencies
        # Instala dependencias da aplicacao e ferramentas de teste/cobertura.
        run: |
          python -m pip install --upgrade pip
          pip install -r /tmp/requirements-ci.txt
          pip install pytest pytest-django pytest-cov factory_boy

      - name: Run migrations
        # Garante que o schema aplica limpo no PostgreSQL do CI.
        run: python manage.py migrate --noinput

      - name: Run tests with coverage gate
        # Falha o pipeline se a cobertura total ficar abaixo de 60%.
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=60
